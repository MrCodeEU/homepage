server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────
    # Serve pre-compressed .gz files generated at build time (no CPU cost)
    gzip_static on;

    # Fallback: compress on-the-fly for anything not pre-compressed
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Immutable assets (content-hashed filenames) ──────────────────
    location /_app/immutable/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /200.html;
        add_header Cache-Control "no-cache";
    }
}
