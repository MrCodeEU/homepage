name: Generate Data

on:
  #schedule:
    # Run every second day at 6 AM UTC
    # - cron: '0 6 */2 * *'

  workflow_dispatch:
    inputs:
      sources:
        description: 'Data sources to generate (all, github, strava, linkedin)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: backend/.cache
          key: homepage-scraper-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            homepage-scraper-cache-${{ runner.os }}-

      - name: Determine sources to generate
        id: sources
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sources=${{ github.event.inputs.sources }}" >> $GITHUB_OUTPUT
          else
            echo "sources=all" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub + Strava data
        # These are fast and reliable — run them first, separately from LinkedIn
        if: steps.sources.outputs.sources == 'all' || steps.sources.outputs.sources == 'github' || steps.sources.outputs.sources == 'strava'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        working-directory: backend
        run: |
          # Determine which non-LinkedIn sources to generate
          if [ "${{ steps.sources.outputs.sources }}" = "all" ]; then
            SRCS="github,strava"
          else
            SRCS="${{ steps.sources.outputs.sources }}"
          fi
          go run ./cmd/generate \
            -output ./data/generated \
            -sources "$SRCS" \
            -verbose

      - name: Generate LinkedIn data
        # Runs independently — failure here does not block the commit step below.
        # Chrome startup on GitHub Actions can be flaky; the scraper retries internally.
        if: steps.sources.outputs.sources == 'all' || steps.sources.outputs.sources == 'linkedin'
        id: linkedin
        continue-on-error: true
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_TOTP_SECRET: ${{ secrets.LINKEDIN_TOTP_SECRET }}
          LINKEDIN_PROFILE_URL: ${{ secrets.LINKEDIN_PROFILE_URL }}
        working-directory: backend
        run: |
          go run ./cmd/generate \
            -output ./data/generated \
            -sources linkedin \
            -verbose

      - name: Warn if LinkedIn generation failed
        if: steps.linkedin.outcome == 'failure'
        run: |
          echo "::warning::LinkedIn data generation failed — using previously committed data. GitHub/Strava data was still updated."
          curl -s \
            -H "Title: Homepage LinkedIn scraper failed" \
            -H "Priority: high" \
            -H "Tags: warning,robot" \
            -d "LinkedIn data generation failed on $(date -u +'%Y-%m-%d %H:%M UTC'). The scraper may need updating (layout change?) or Chrome failed to start. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "https://ntfy.mljr.eu/${{ secrets.NTFY_TOPIC }}"

      - name: Commit and push changes
        # Always runs so GitHub/Strava updates are committed even when LinkedIn fails
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add -f backend/data/generated/*.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          SOURCES="${{ steps.sources.outputs.sources }}"
          LAST_MSG=$(git log -1 --pretty=%s)

          # If the last commit was also a data update, amend it instead of creating
          # a new commit — this prevents the git history from growing unboundedly with
          # large base64-image-containing JSON files on every run.
          if echo "$LAST_MSG" | grep -q "^chore: update.*data"; then
            git commit --amend --no-edit --reset-author
            git push --force-with-lease
          else
            git commit -m "chore: update $SOURCES data

          Generated by GitHub Actions workflow
          Triggered: ${{ github.event_name }}
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
          fi

        # Disable this step for now by setting condition to false
      - name: Trigger deployment webhook
        if: success() && steps.sources.outputs.sources != 'none' && false
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"source": "github-actions", "action": "data-update", "timestamp": "'$(date -u +%s)'"}' \
            ${{ secrets.DEPLOY_WEBHOOK_URL }} || true
